document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n      { id:'carnes', name:'Carnes ahumadas', desc:'Ahumado artesanal en roble', initial:'C', tag:'cecinas', price:'$11.500 / kg', tintA:'#EBD4C2', tintB:'#C58E6E',\n        groups:[{comuna:'Providencia',anotados:6,min:10},{comuna:'Macul',anotados:4,min:10}]},\n      { id:'pescados', name:'Pescados y mariscos', desc:'Frescos del día, sur de Chile', initial:'P', tag:'mariscos', price:'$10.900 / kg', tintA:'#E4E6D2', tintB:'#AEC0A6',\n        groups:[{comuna:'Las Condes',anotados:9,min:14},{comuna:'Ñuñoa',anotados:7,min:14},{comuna:'Peñalolén',anotados:12,min:14},{comuna:'Providencia',anotados:5,min:14}]},\n    ];\n    P.forEach(p => p.groups.forEach((g,i) => { g.id = p.id + '-' + i; g.productName = p.name; }));\n    return P;\n  }\n\n  initials(name){\n    if(name === 'Tú') return 'Tú';\n    const parts = name.trim().split(/\\s+/);\n    return ((parts[0][0]||'') + (parts[1] ? parts[1][0] : '')).toUpperCase();\n  }\n  color(name){\n    let h = 0;\n    for(let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;\n    return this.avatarColors[h % this.avatarColors.length];\n  }\n  seed(g){\n    const pn = g.productName.toLowerCase();\n    return [\n      {name:'Antonia G.', text:'Yo me sumo, justo necesitaba ' + pn + ' para la semana.', time:'1 h'},\n      {name:'Diego C.', text:'Buena! avisen cuando falte poco para cerrar el grupo.', time:'40 min'},\n    ];\n  }\n  findGroup(gid){\n    for(const p of this.products){\n      const g = p.groups.find(x => x.id === gid);\n      if(g) return { product:p, group:g };\n    }\n    return {};\n  }\n  ensureDyn(prevDyn, gid){\n    const dyn = { ...prevDyn };\n    if(!dyn[gid]){\n      const { group } = this.findGroup(gid);\n      const base = group.comments ? group.comments : this.seed(group);\n      dyn[gid] = { joined:false, extra:0, comments: base.map(c => ({ ...c })) };\n    }\n    return dyn;\n  }\n\n  openProduct(id){ this.setState({ productId:id, view:'groups', groupId:null, panelOpen:true }); }\n  closePanel(){ this.setState({ panelOpen:false }); }\n  openGroup(gid){ this.setState(prev => ({ dyn:this.ensureDyn(prev.dyn, gid), groupId:gid, view:'detail' })); }\n  toggleJoin(gid){\n    this.setState(prev => {\n      const dyn = this.ensureDyn(prev.dyn, gid);\n      const d = { ...dyn[gid] };\n      d.joined = !d.joined;\n      d.extra += d.joined ? 1 : -1;\n      dyn[gid] = d;\n      return { dyn };\n    });\n  }\n  post(gid){\n    const t = this.state.draft.trim();\n    if(!t) return;\n    this.setState(prev => {\n      const dyn = this.ensureDyn(prev.dyn, gid);\n      const d = { ...dyn[gid] };\n      d.comments = d.comments.concat([{ name:'Tú', text:t, time:'ahora', you:true }]);\n      dyn[gid] = d;\n      return { dyn, draft:'' };\n    });\n  }\n\n  avatarChip(name, size){\n    const s = size || 30;\n    const you = name === 'Tú';\n    return {\n      initials:this.initials(name), name,\n      style:`width:${s}px; height:${s}px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:${s<28?10.5:11.5}px; font-weight:700; color:#FFFDF7; background:${you?'#C29A2E':this.color(name)}; box-shadow:0 0 0 2.5px var(--c-surf2); margin-left:-8px;`,\n    };\n  }\n\n  liveGroup(p, g, i){\n    const d = this.state.dyn[g.id];\n    const joined = d ? d.joined : false;\n    const extra = d ? d.extra : 0;\n    const anotados = g.anotados + extra;\n    const pct = Math.min(100, Math.round(anotados / g.min * 100));\n    const ratio = anotados / g.min;\n    let statusText, statusBg, statusColor;\n    if(ratio >= 1){ statusText='Pedido cerrado'; statusBg='#E1F0DC'; statusColor='#3E7A42'; }\n    else if(ratio >= 0.8){ statusText='Casi cerrado'; statusBg='#FBE2C4'; statusColor='#B5621C'; }\n    else if(ratio >= 0.4){ statusText='En progreso'; statusBg='#FCEFC2'; statusColor='#977612'; }\n    else { statusText='Recién abierto'; statusBg='#EDE7DA'; statusColor='#7A7060'; }\n    const names = [];\n    for(let k=0;k<g.anotados;k++){ names.push(this.namePool[(i*3 + k) % this.namePool.length]); }\n    return { joined, extra, anotados, pct, statusText, statusBg, statusColor, names };\n  }\n\n  renderVals(){\n    const s = this.state;\n    const T = this.PALETTES[this.props.palette] || this.PALETTES['Mostaza'];\n    const L = this.LAYOUTS[this.props.layout] || this.LAYOUTS['Acogedor'];\n    const en = this.props.energia || 'Animado';\n    const euph = en === 'Eufórico';\n    const media = this.props.media || 'Íconos';\n    const usePhotos = media === 'Fotos';\n    const EMOJI = { huevos:'🥚', cafe:'☕', aceite:'🫒', miel:'🍯', frambuesas:'🍓', quesos:'🧀', vinos:'🍷', carnes:'🥩', pescados:'🐟' };\n    const FONTS = {\n      'Montserrat': { d:\"'Montserrat', sans-serif\", b:\"'Inter', sans-serif\" },\n      'Jakarta':    { d:\"'Plus Jakarta Sans', sans-serif\", b:\"'Plus Jakarta Sans', sans-serif\" },\n      'Editorial':  { d:\"'DM Serif Display', Georgia, serif\", b:\"'Plus Jakarta Sans', sans-serif\" },\n    };\n    const F = FONTS[this.props.tipografia] || FONTS['Jakarta'];\n    const FORMA = {\n      'Redondeado': { lg:'22px', md:'16px', sm:'13px' },\n      'Suave':      { lg:'14px', md:'12px', sm:'10px' },\n      'Recto':      { lg:'5px',  md:'5px',  sm:'6px' },\n    };\n    const R = FORMA[this.props.forma] || FORMA['Redondeado'];\n    const dark = this.state.darkMode;\n    const C = dark ? {\n      text:'#F5F5F5', muted:'#A6A29A', faint:'#847F75', pos:'#79C089',\n      surf:'#181818', surf2:'#211E14', panel:'#141414',\n      border:'#2C2C2C', track:'#2E2A1C', onAccent:'#1A1607',\n      header:'rgba(15,15,15,.82)', iconBox:'rgba(255,255,255,.07)',\n      page:'radial-gradient(120% 90% at 100% 0%, #1B1608 0%, #121212 45%, #0F0F0F 100%)',\n    } : {\n      text:'#2A2018', muted:'#6E6A62', faint:'#928C80', pos:'#3F7045',\n      surf:'#FFFFFF', surf2:'#FBF4E2', panel:'#FFFDF7',\n      border:'#E7DECB', track:'#F0E6CE', onAccent:'#2A2018',\n      header:'rgba(251,246,234,.82)', iconBox:'rgba(255,255,255,.55)',\n      page:T.hero,\n    };\n    const themeGrad = `linear-gradient(140deg, ${T.light}, ${T.p})`;\n    const grad90 = `linear-gradient(90deg, ${T.light}, ${T.p})`;\n    const themeHdr = dark ? 'linear-gradient(160deg, #241D0B, #14120A)' : `linear-gradient(160deg, ${T.chipBg}, ${T.light})`;\n    const themeAccentInk = dark ? T.p : T.accentInk;\n\n    const products = this.products.map(p => ({\n      id:p.id, name:p.name, desc:p.desc, initial:p.initial, tag:p.tag,\n      emoji: EMOJI[p.id] || '🧺', photoHint: 'Foto de ' + p.name.toLowerCase(),\n      activity: p.groups.length + (p.groups.length === 1 ? ' grupo activo' : ' grupos activos'),\n      imgStyle: `position:relative; height:${L.imgH}px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:linear-gradient(140deg, ${p.tintA}, ${p.tintB});`,\n      open: () => this.openProduct(p.id),\n    }));\n\n    const active = this.products.find(x => x.id === s.productId) || null;\n    let groups = [];\n    let productTitle = '', productInitial = '', productActivity = '', productEmoji = '';\n    if(active){\n      productTitle = active.name;\n      productInitial = active.initial;\n      productEmoji = EMOJI[active.id] || '🧺';\n      productActivity = active.groups.length + (active.groups.length === 1 ? ' grupo activo' : ' grupos activos');\n      groups = active.groups.map((g,i) => {\n        const lv = this.liveGroup(active, g, i);\n        return {\n          id:g.id, comuna:g.comuna,\n          statusText:lv.statusText, statusBg:lv.statusBg, statusColor:lv.statusColor,\n          progressLabel: lv.anotados + ' de ' + g.min + ' anotados',\n          fillStyle: `width:${lv.pct}%; height:100%; border-radius:99px; background:${grad90}; transition:width .5s ease;`,\n          open: () => this.openGroup(g.id),\n        };\n      });\n    }\n\n    let detail = null;\n    if(active && s.view === 'detail'){\n      const i = active.groups.findIndex(g => g.id === s.groupId);\n      const g = active.groups[i];\n      if(g){\n        const lv = this.liveGroup(active, g, i);\n        const d = s.dyn[g.id];\n        const comments = (d ? d.comments : (g.comments || this.seed(g))).map(c => {\n          const chip = this.avatarChip(c.name, 34);\n          return {\n            name:c.name, text:c.text, time:c.time,\n            initials:chip.initials, style:chip.style,\n            bubbleStyle: c.you\n              ? `font-size:14px; line-height:1.45; color:var(--c-text); background:${dark ? 'rgba(252,206,78,.15)' : T.chipBg}; border:1px solid ${dark ? 'rgba(252,206,78,.32)' : T.chipBd}; border-radius:4px 13px 13px 13px; padding:9px 13px;`\n              : 'font-size:14px; line-height:1.45; color:var(--c-text); background:var(--c-surf2); border-radius:4px 13px 13px 13px; padding:9px 13px;',\n          };\n        });\n        const shown = lv.names.slice(0, 8).map(n => this.avatarChip(n, 30));\n        if(lv.joined) shown.unshift(this.avatarChip('Tú', 30));\n        const rest = lv.anotados - shown.length;\n        detail = {\n          comuna:g.comuna, productName:active.name, price:active.price,\n          anotados:lv.anotados, min:g.min,\n          fillStyle: `width:${lv.pct}%; height:100%; border-radius:99px; background:${grad90}; transition:width .5s ease;`,\n          remainText: lv.anotados >= g.min\n            ? '¡Mínimo alcanzado! La compra se concreta esta semana.'\n            : ('Faltan ' + (g.min - lv.anotados) + ' personas para cerrar el pedido'),\n          statusText:lv.statusText, statusBg:lv.statusBg, statusColor:lv.statusColor,\n          joined:lv.joined,\n          joinLabel: lv.joined ? '✓ Estás anotado' : 'Sumarme a la compra',\n          joinStyle: lv.joined\n            ? 'font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; padding:13px 20px; border-radius:var(--r-sm); border:1.5px solid #3E7A42; background:#E1F0DC; color:#2F6634;'\n            : `font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; padding:13px 22px; border-radius:var(--r-sm); border:none; background:${themeGrad}; color:var(--c-on-accent); box-shadow:0 5px 16px ${T.glow};`,\n          avatars: shown,\n          avatarNote: rest > 0 ? ('+' + rest + ' personas ya anotadas') : (lv.anotados + ' personas anotadas'),\n          comments,\n          commentCount: comments.length + (comments.length === 1 ? ' mensaje' : ' mensajes'),\n          back: () => this.setState({ view:'groups' }),\n          toggleJoin: () => this.toggleJoin(g.id),\n          post: () => this.post(g.id),\n        };\n      }\n    }\n\n    const showBanner = en !== 'Sereno';\n    const bannerAv = ['Martina A.','Rodrigo P.','Camila S.','Felipe R.','Sofía R.'].map(n => this.avatarChip(n, 32));\n\n    return {\n      url: 'app.conpro.cl/catalogo',\n      tabs: [{ title: 'Conpro · Compra comunitaria' }],\n      products,\n      themeHero: C.page,\n      themeGrad, themeHdr,\n      themeGlow: T.glow,\n      themePillBg: dark ? C.surf2 : T.pillBg, themePillBd: dark ? C.border : T.pillBd, themeAccentInk,\n      cText:C.text, cMuted:C.muted, cFaint:C.faint, cPos:C.pos, cSurf:C.surf, cSurf2:C.surf2, cPanel:C.panel, cBorder:C.border, cTrack:C.track, cOnAccent:C.onAccent, headerBg:C.header, iconBoxBg:C.iconBox,\n      gridStyle: `display:grid; grid-template-columns:repeat(${L.cols}, 1fr); gap:${L.gap}px;`,\n      showBanner,\n      bannerAvatars: bannerAv,\n      bannerStyle: `display:flex; align-items:center; gap:16px; padding:16px 20px; border-radius:18px; margin-bottom:24px; background:${dark ? '#1C1A12' : (euph ? T.light : T.chipBg)}; border:1px solid ${dark ? '#33301F' : T.chipBd};`,\n      bannerText: euph ? '¡142 vecinos comprando juntos ahora mismo!' : '142 vecinos están comprando juntos esta semana',\n      bannerSub: euph ? '5 grupos cierran hoy — súmate antes de que se llenen' : '23 grupos activos en tu zona, 8 a punto de cerrar',\n      liveTag: euph,\n      liveTagStyle: `display:inline-flex; align-items:center; gap:7px; flex:none; font-size:11px; font-weight:800; letter-spacing:.07em; color:#fff; background:${T.p}; padding:7px 12px; border-radius:99px;`,\n      dotPulse: euph ? 'cpPulse 1.5s ease-in-out infinite' : 'none',\n      panelTransform: s.panelOpen ? '0%' : '100%',\n      scrimOpacity: s.panelOpen ? '1' : '0',\n      scrimPointer: s.panelOpen ? 'auto' : 'none',\n      gridOpacity: s.panelOpen ? '.4' : '1',\n      showGroups: !!active && s.view === 'groups',\n      showDetail: !!detail,\n      groups, detail,\n      productTitle, productInitial, productActivity, productEmoji,\n      usePhotos, useIcons: !usePhotos,\n      displayFont: F.d, bodyFont: F.b, rLg: R.lg, rMd: R.md, rSm: R.sm,\n      draft: s.draft,\n      onDraft: (e) => this.setState({ draft: e.target.value }),\n      onDraftKey: (e) => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); if(detail) detail.post(); } },\n      closePanel: () => this.closePanel(),\n      toggleTheme: () => this.setState(prev => ({darkMode: !prev.darkMode})),\n      showMoon: dark,\n      showSun: !dark,\n      moonFill: dark ? T.p : 'rgba(200,196,188,0.7)',\n      sunStroke: dark ? 'var(--c-faint)' : T.accentInk,\n      switchPillBg: dark ? 'rgba(252,206,78,0.22)' : '#D9D5CC',\n      switchCircleStyle: {position:'absolute', top:'3px', left:'3px', width:'20px', height:'20px', borderRadius:'50%', background: dark ? T.p : '#FFFFFF', boxShadow:'0 2px 8px rgba(0,0,0,0.25)', transform:`translateX(${dark?'0px':'18px'})`, transition:'transform .28s cubic-bezier(.22,.61,.36,1), background .25s'},\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
